<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">World map</title>
  <desc id="desc">Projection-faithful equirectangular world map used for geographic click recognition.</desc>
